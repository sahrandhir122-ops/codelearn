version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: codelearn-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret

  redis:
    image: redis:7-alpine
    container_name: codelearn-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: codelearn-backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: codelearn-frontend
    ports:
      - "5173:5173"
    env_file: ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
